<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Sunshine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #f9fafb; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-center">
  <div class="max-w-md w-full bg-white rounded-[2rem] shadow-xl p-8 border border-gray-100">
    <div class="text-6xl mb-6">☀️</div>
    <h1 class="text-3xl font-black text-gray-900 mb-4 tracking-tight">You're Offline</h1>
    <p class="text-gray-500 mb-8 leading-relaxed">
      It looks like you don't have an internet connection right now. 
      Sunshine will be back once you're reconnected.
    </p>
    <div class="space-y-4">
      <button onclick="window.location.reload()" 
              class="w-full bg-sunshine-500 hover:bg-sunshine-600 text-white font-black py-4 rounded-2xl transition-all shadow-lg active:scale-95 text-sm uppercase tracking-widest">
        Try Reconnecting
      </button>
      <a href="/volunteer/shifts" 
         class="block w-full text-sm font-bold text-indigo-600 hover:underline">
        Go to My Shifts
      </a>
    </div>
  </div>
</body>
</html>

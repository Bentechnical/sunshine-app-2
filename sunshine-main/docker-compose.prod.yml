# Production smoke-test stack (app + postgres, no Traefik — Dokploy handles that).
# Usage: docker compose -f docker-compose.prod.yml up
# Requires: .env.prod (see .env.example)

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: sunshine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sunshine
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunshine"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/syrell/sunshine:latest
    ports:
      - "8080:8080"
    env_file: .env.prod
    environment:
      ROCKET_DATABASES: '{sunshine_db={url="postgres://sunshine:${POSTGRES_PASSWORD}@postgres:5432/sunshine"}}'
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_prod_data:

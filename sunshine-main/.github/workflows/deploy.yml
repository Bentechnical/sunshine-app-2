name: Build, Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'templates/**'
      - 'migrations/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'scripts/entrypoint.sh'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Promote to production after staging"
        type: boolean
        default: false
      hotfix:
        description: "Deploy straight to production (skip staging)"
        type: boolean
        default: false
      skip_migrations:
        description: "Skip DB migrations on deploy"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sunshine

jobs:
  # ─── 1. Lint & Format Check ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
      
      - name: Add rustfmt and clippy
        run: rustup component add rustfmt clippy
      
      - name: Check formatting
        run: cargo fmt -- --check
      
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─── 2. Run Tests ─────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: sunshine
          POSTGRES_PASSWORD: sunshine
          POSTGRES_DB: sunshine
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
      
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features native-tls,postgres
      
      - name: Run migrations
        env:
          DATABASE_URL: postgres://sunshine:sunshine@localhost:5432/sunshine
        run: sqlx migrate run
      
      - name: Run tests
        env:
          DATABASE_URL: postgres://sunshine:sunshine@localhost:5432/sunshine
          SQLX_OFFLINE: true
        run: cargo test --all-features

  # ─── 3. Build & push images ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      staging_tag: ${{ steps.meta.outputs.staging_tag }}
      prod_tag: ${{ steps.meta.outputs.prod_tag }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "staging_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "prod_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Build staging image (with dev-routes)
        if: ${{ !inputs.hotfix }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.staging_tag }}
          build-args: CARGO_FEATURES=dev-routes
          cache-from: type=gha,scope=staging
          cache-to: type=gha,mode=max,scope=staging

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.prod_tag }}
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod

  # ─── 4. Deploy to staging (skipped on hotfix) ─────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: ${{ github.event_name != 'pull_request' && !inputs.hotfix }}

    steps:
      - uses: actions/checkout@v4

      - name: Debug secrets
        run: |
          echo "DOKPLOY_URL set: ${{ secrets.DOKPLOY_URL != '' }}"
          echo "DOKPLOY_API_TOKEN set: ${{ secrets.DOKPLOY_API_TOKEN != '' }}"
          echo "DOKPLOY_STAGING_APP_ID set: ${{ secrets.DOKPLOY_STAGING_APP_ID != '' }}"
          echo "DOKPLOY_PROD_APP_ID set: ${{ secrets.DOKPLOY_PROD_APP_ID != '' }}"
          echo "STAGING_URL set: ${{ secrets.STAGING_URL != '' }}"
          echo "PROD_URL set: ${{ secrets.PROD_URL != '' }}"
          echo "DOKPLOY_URL prefix: $(echo '${{ secrets.DOKPLOY_URL }}' | cut -c1-20)..."
          echo "STAGING_URL prefix: $(echo '${{ secrets.STAGING_URL }}' | cut -c1-20)..."

      - name: Ensure staging database
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_STAGING_APP_ID }}
          DB_LABEL: Staging
        run: ./scripts/ensure-db.sh

      - name: Deploy staging
        run: |
          API="${{ secrets.DOKPLOY_URL }}/api"
          APP_ID="${{ secrets.DOKPLOY_STAGING_APP_ID }}"
          TOKEN="${{ secrets.DOKPLOY_API_TOKEN }}"

          curl -fsSL -X POST "${API}/application.update" \
            -H "Content-Type: application/json" -H "x-api-key: ${TOKEN}" \
            -d "{\"applicationId\": \"${APP_ID}\", \"dockerImage\": \"${{ needs.build.outputs.staging_tag }}\"}"

          curl -fsSL -X POST "${API}/application.deploy" \
            -H "Content-Type: application/json" -H "x-api-key: ${TOKEN}" \
            -d "{\"applicationId\": \"${APP_ID}\"}"

      - name: Wait for staging
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -fsSL \
              "${{ secrets.DOKPLOY_URL }}/api/application.one?applicationId=${{ secrets.DOKPLOY_STAGING_APP_ID }}" \
              -H "x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('applicationStatus','unknown'))")
            echo "[${i}/60] ${STATUS}"
            if [ "$STATUS" = "done" ] || [ "$STATUS" = "idle" ] || [ "$STATUS" = "running" ]; then exit 0; fi
            if [ "$STATUS" = "error" ]; then echo "Failed."; exit 1; fi
            sleep 5
          done
          echo "Timed out."; exit 1

  # ─── 5. Smoke tests ───────────────────────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: ${{ github.event_name != 'pull_request' && !inputs.hotfix }}

    steps:
      - name: Wait for traffic routing
        run: sleep 10

      - name: Health + DB check
        run: |
          RESPONSE=$(curl -fsSL "${{ secrets.STAGING_URL }}/health")
          echo "${RESPONSE}"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('db')=='ok', f'DB check failed: {d}'"

      - name: Login page + auth redirect
        run: |
          curl -fsSL -o /dev/null -w "%{http_code}" --max-redirs 5 "${{ secrets.STAGING_URL }}/auth/login" | grep -q 200
          curl -fsSL -o /dev/null -w "%{http_code}" --max-redirs 0 "${{ secrets.STAGING_URL }}/" | grep -qE "302|303"

  # ─── 6. Deploy to production ───────────────────────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: [lint, test, build, deploy-staging, smoke-test]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      needs.build.result == 'success' &&
      (inputs.hotfix || (inputs.deploy_production && needs.smoke-test.result == 'success'))
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Ensure production database
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_PROD_APP_ID }}
          DB_LABEL: Production
        run: ./scripts/ensure-db.sh

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote prod tag to latest
        run: |
          docker buildx imagetools create \
            --tag "${{ needs.build.outputs.image }}:latest" \
            "${{ needs.build.outputs.prod_tag }}"

      - name: Deploy to production
        run: |
          API="${{ secrets.DOKPLOY_URL }}/api"
          APP_ID="${{ secrets.DOKPLOY_PROD_APP_ID }}"
          TOKEN="${{ secrets.DOKPLOY_API_TOKEN }}"

          curl -fsSL -X POST "${API}/application.update" \
            -H "Content-Type: application/json" -H "x-api-key: ${TOKEN}" \
            -d "{\"applicationId\": \"${APP_ID}\", \"dockerImage\": \"${{ needs.build.outputs.prod_tag }}\"}"

          # Set SKIP_MIGRATIONS if requested
          if [ "${{ inputs.skip_migrations }}" = "true" ]; then
            ENV=$(curl -fsSL "${API}/application.one?applicationId=${APP_ID}" \
              -H "x-api-key: ${TOKEN}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('env','') or '')")
            if ! echo "$ENV" | grep -q "SKIP_MIGRATIONS"; then
              NEW_ENV=$(printf "%s\nSKIP_MIGRATIONS=true" "$ENV")
              curl -fsSL -X POST "${API}/application.saveEnvironment" \
                -H "Content-Type: application/json" -H "x-api-key: ${TOKEN}" \
                -d "{\"applicationId\": \"${APP_ID}\", \"env\": $(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" <<< "$NEW_ENV")}" > /dev/null
            fi
          fi

          curl -fsSL -X POST "${API}/application.deploy" \
            -H "Content-Type: application/json" -H "x-api-key: ${TOKEN}" \
            -d "{\"applicationId\": \"${APP_ID}\"}"

      - name: Wait for production
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -fsSL \
              "${{ secrets.DOKPLOY_URL }}/api/application.one?applicationId=${{ secrets.DOKPLOY_PROD_APP_ID }}" \
              -H "x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('applicationStatus','unknown'))")
            echo "[${i}/60] ${STATUS}"
            if [ "$STATUS" = "done" ] || [ "$STATUS" = "idle" ] || [ "$STATUS" = "running" ]; then exit 0; fi
            if [ "$STATUS" = "error" ]; then echo "Failed."; exit 1; fi
            sleep 5
          done
          echo "Timed out."; exit 1

      - name: Verify production health
        run: |
          sleep 10
          curl -fsSL "${{ secrets.PROD_URL }}/health" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('db')=='ok', f'FAILED: {d}'"
          echo "Production is healthy."

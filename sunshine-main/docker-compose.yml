# Local development: run postgres only.
# Start with: docker compose up postgres
# Then run the app natively: cargo run

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: sunshine
      POSTGRES_PASSWORD: sunshine
      POSTGRES_DB: sunshine
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunshine"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

[default]
address = "127.0.0.1"
port = 8000
workers = 4
keep_alive = 75
log_level = "normal"
cli_colors = false
# Template directory
template_dir = "templates"

[default.limits]
form = "32 MiB"
file = "10 MiB"
data-form = "32 MiB"

# DB URL — set via ROCKET_DATABASES env var in production.
# For local dev the value below is used as a fallback.
[default.databases.sunshine_db]
url = "postgres://sunshine:sunshine@127.0.0.1:5437/sunshine"
min_connections = 2
max_connections = 10
connect_timeout = 5
idle_timeout = 300

# In Docker / Dokploy set:
# ROCKET_DATABASES='{sunshine_db={url="postgres://..."}}'

[default.cookies]
# 64-byte hex secret — generate with: openssl rand -hex 64
# Overridden by ROCKET_SECRET_KEY env var in production
# secret_key is set via ROCKET_SECRET_KEY env var (loaded from .env)

[debug]
port = 8000
log_level = "debug"

[release]
address = "0.0.0.0"
port = 8080
log_level = "normal"
workers = 8
